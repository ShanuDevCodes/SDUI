name: Release Gate (full matrix)

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-and-test-jvm:
    name: JVM (compile + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - run: ./gradlew compileKotlinMetadata :androidApp:compileDebugKotlin :desktopApp:compileKotlin :shared:jvmTest --console=plain

  build-and-test-ios:
    name: iOS simulator (iOS test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - run: ./gradlew :shared:iosSimulatorArm64Test --console=plain
